<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Flight Control</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;500&display=swap"
          rel="stylesheet">
</head>

<body>

<div class="sky">

    <div class="radar"></div>

    <div class="cloud c1"></div>
    <div class="cloud c2"></div>
    <div class="cloud c3"></div>

    <div class="plane">✈</div>

</div>

<header>

    <h1>FLIGHT CONTROL</h1>

    <p>Your Personal Music Airport</p>

</header>

<nav>

    <a href="#">Home</a>

    <a href="#">Categories</a>

    <a href="#">Drone Game</a>

    <a href="#">Flight Log</a>

</nav>

<section class="hero">

    <div class="glass">

        <h2>Happy Birthday ❤️</h2>

        <p>

            Welcome aboard.

            Every song is a destination.

            Every playlist is a new flight.

        </p>

        <button id="enterBtn">

            Enter Hangar

        </button>

    </div>

</section>

<section id="hangars">

    <h2 class="section-title">
        Flight Hangars
    </h2>

    <div id="hangarGrid"></div>

</section>

<section id="playlistPage">

    <button id="backButton">
        ← Back to Hangars
    </button>

    <h2 id="playlistTitle"></h2>

    <div id="songList"></div>

</section>

<script src="songs.js"></script>
<script src="script.js"></script>

</html>
